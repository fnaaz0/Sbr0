<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aql</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    header{
      background:#0b6b4b;
      color:#fff;
      text-align:center;
      padding:18px;
      font-size:24px;
      font-weight:bold;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 2px 8px rgba(0,0,0,.15);
    }

    h2{
      color:#0b6b4b;
      margin-top:0;
    }

    p{
      line-height:1.8;
      color:#333;
    }
  </style>
</head>
<body>

<header>
🧠 Aql
</header>

<div class="container">

<div class="card">
<h2>Islam Aur Aql</h2>

<p>
Allah Ta'ala ne insaan ko Aql di taa ke woh Haq ko pehchane,
Qur'an ko samjhe aur apni zindagi ko behtar banaye.
</p>

</div>

<div class="card">
<h2>Yaad Rakhein</h2>

<p>
Achi Aql wahi hai jo Qur'an aur Sunnat ki roshni mein istemal ki jaye.
</p>

</div>

</div>

</body>
</html>
