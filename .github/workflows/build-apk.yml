name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        # No caching configurations here to prevent the folder search crash

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Build Web Project
      run: |
        npm run build --if-present || mkdir -p www

    - name: Initialize and Sync Capacitor Android
      run: |
        # Creates the android folder dynamically if it doesn't exist in your repo
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
