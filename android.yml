name: Android Build

on:
  push:
    branches: [ "main", "master" ] # Triggers whenever you push to main or master
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Project
      run: |
        # If you don't have a build script, this fallback ensures a www or dist folder exists
        npm run build -

        
